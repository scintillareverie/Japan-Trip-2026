      return (
        <label htmlFor={inputId} className="pressable" style={{ display: "flex", alignItems: "flex-start", gap: 10, padding: "10px 12px", background: "#fff", borderRadius: 10, marginBottom: 7, border: `1.5px solid ${checked ? "#BBF7D0" : "#EDE8E0"}`, opacity: checked ? 0.62 : 1 }}>
          <input id={inputId} type="checkbox" checked={checked} onChange={onToggle} style={{ width: 18, height: 18, marginTop: 2, accentColor: "#22C55E", flexShrink: 0 }} />
          <div>
            <div style={{ fontSize: 13, fontWeight: 600, color: "#1A1208", textDecoration: checked ? "line-through" : "none" }}>{item.name}</div>
            <div style={{ fontSize: 11, color: "#8A7566", marginTop: 2 }}>{item.sub}</div>
          </div>
        </label>
      );
    }

    function HotelCard({ hotel }) {
      const cfg = getCityCfg(hotel.city);
      return (
        <div style={{ background: "#fff", borderRadius: 12, marginBottom: 8, border: `1.5px solid ${cfg.border}55`, padding: "13px 15px", display: "flex", gap: 12, alignItems: "flex-start" }}>
          <div style={{ fontSize: 24 }}>🏨</div>
          <div>
            <div style={{ fontSize: 14, fontWeight: 700 }}>{hotel.name}</div>
            <div style={{ fontSize: 12, color: "#8A7566", marginTop: 3 }}>{hotel.dates} · {hotel.nights} nights · {hotel.area}</div>
          </div>
        </div>
      );
    }

    function PrepTab({ actionsOpen, setActionsOpen, doneItems, toggleDone }) {
      const doneCount = CHECKLIST.filter((item) => doneItems.includes(item.name)).length;
      return (
        <div className="fade-in">
          <SectionTitle eyebrow="Before departure" title="Prep" subtitle="Action cards, a proper checkable to-do list, and your hotel confirmations in one place." color="#B45309" />

          <div style={{ marginBottom: 18, background: "#FFFBEB", border: "1.5px solid #FDE68A", borderRadius: 14, overflow: "hidden" }}>
            <div className="pressable" onClick={() => setActionsOpen(!actionsOpen)} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 14px" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <span style={{ fontSize: 15 }}>⚠️</span>
                <span style={{ fontSize: 12.5, fontWeight: 700, color: "#92400E" }}>Action Required</span>
              </div>
              <span style={{ color: "#B45309", fontSize: 13, transform: actionsOpen ? "rotate(180deg)" : "none", transition: "transform 0.2s" }}>▾</span>
            </div>
            {actionsOpen ? <div style={{ padding: "0 14px 14px", display: "grid", gap: 8 }} className="fade-in">{ACTIONS.map((action) => <ActionCard key={action.title} action={action} />)}</div> : null}
          </div>

          <SectionTitle eyebrow="Checklist" title={`Pre-trip tasks · ${doneCount}/${CHECKLIST.length} done`} color="#7C2D12" />
          {CHECKLIST.map((item) => <ChecklistItem key={item.name} item={item} checked={doneItems.includes(item.name)} onToggle={() => toggleDone(item.name)} />)}

          <SectionTitle eyebrow="Hotels" title="Confirmations" color="#1D4ED8" />
          {HOTELS.map((hotel) => <HotelCard key={hotel.name} hotel={hotel} />)}
        </div>
      );
    }

    function TipsTab() {
      return (
        <div className="fade-in">
          <SectionTitle eyebrow="Practical" title="Japan tips" subtitle="Your original guidance remains here, with the combined app sections now living above it." color="#155E3E" />
          {TIPS.map((tip) => (
            <div key={tip.title} style={{ background: "#fff", borderRadius: 14, padding: "14px 15px", marginBottom: 9, border: "1.5px solid #EDE8E0", boxShadow: "0 1px 4px rgba(0,0,0,0.04)" }}>
              <div style={{ fontSize: 13.5, fontWeight: 700, color: "#1A1208", marginBottom: 6 }}>{tip.icon} {tip.title}</div>
              <div style={{ fontSize: 12.5, color: "#6B5C4E", lineHeight: 1.65 }}>{tip.body}</div>
            </div>
          ))}
          <div style={{ background: "linear-gradient(135deg, #1A0800, #3D1408)", borderRadius: 14, padding: 16, marginTop: 4, textAlign: "center" }}>
            <div style={{ fontFamily: "Cormorant Garamond, serif", fontSize: 20, fontStyle: "italic", color: "rgba(255,215,150,0.9)" }}>Osaka · Kyoto · Tokyo</div>
            <div style={{ fontSize: 11, color: "rgba(255,255,255,0.5)", marginTop: 4 }}>25 Nov – 7 Dec 2026 · Cleaned React itinerary version</div>
          </div>
        </div>
      );
    }

    function JapanTripCombined() {
      const [tab, setTab] = useState("schedule");
      const [openDay, setOpenDay] = useState(1);
      const [actionsOpen, setActionsOpen] = useState(true);
      const [foodCity, setFoodCity] = useState("Osaka");
      const [foodSection, setFoodSection] = useState("cafes");
      const [cityFilter, setCityFilter] = useState("All");
      const [doneItems, setDoneItems] = useState([]);

      const filteredDays = useMemo(() => {
        if (cityFilter === "All") return DAYS;
        return DAYS.filter((day) => day.city === cityFilter);
      }, [cityFilter]);

      const toggleDone = (name) => {
        setDoneItems((prev) => prev.includes(name) ? prev.filter((x) => x !== name) : [...prev, name]);
      };

      return (
        <div style={{ background: "#FAF8F3", minHeight: "100vh", maxWidth: 560, margin: "0 auto", fontFamily: "DM Sans, -apple-system, sans-serif", color: "#1A1208" }}>
          <style>{FONT_STYLE}</style>
          <Header cityFilter={cityFilter} setCityFilter={setCityFilter} />
          <TabBar tab={tab} setTab={setTab} />

          <div style={{ padding: "12px 14px 40px" }}>
            {tab === "schedule" ? <ScheduleTab filteredDays={filteredDays} openDay={openDay} setOpenDay={setOpenDay} /> : null}
            {tab === "cities" ? <CitiesTab cityFilter={cityFilter} setTab={setTab} setOpenDay={setOpenDay} /> : null}
            {tab === "food" ? <FoodTab foodCity={foodCity} setFoodCity={setFoodCity} foodSection={foodSection} setFoodSection={setFoodSection} /> : null}
            {tab === "prep" ? <PrepTab actionsOpen={actionsOpen} setActionsOpen={setActionsOpen} doneItems={doneItems} toggleDone={toggleDone} /> : null}
            {tab === "tips" ? <TipsTab /> : null}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<JapanTripCombined />);
  </script>
</body>
</html>
