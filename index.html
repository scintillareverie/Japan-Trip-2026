<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Japan Trip 2026 Preview</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,400;1,500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,700&display=swap");

    :root {
      --bg: #faf8f3;
      --paper: #ffffff;
      --ink: #1a1208;
      --muted: #8a7566;
      --muted-2: #6b5748;
      --line: #ede8e0;
      --gold: #ffd080;
      --header-1: #1a0800;
      --header-2: #3b1306;
      --header-3: #6a1f0e;
      --header-4: #8c3514;
      --shadow: 0 10px 30px rgba(60, 20, 5, 0.12);
      --radius-lg: 16px;
      --radius-md: 14px;
      --radius-sm: 12px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: "DM Sans", -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    button,
    input {
      font: inherit;
    }

    .app-shell {
      max-width: 560px;
      margin: 0 auto;
      min-height: 100vh;
      background: var(--bg);
    }

    .fade-in {
      animation: fadeIn 0.22s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(4px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .pressable {
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease, background 0.2s ease, border-color 0.2s ease;
    }

    .pressable:active {
      transform: scale(0.985);
      opacity: 0.85;
    }

    ::-webkit-scrollbar {
      width: 4px;
      height: 4px;
    }

    ::-webkit-scrollbar-thumb {
      background: #d4c4b0;
      border-radius: 999px;
    }

    .header {
      position: sticky;
      top: 0;
      z-index: 10;
      padding: 42px 22px 18px;
      color: #fff;
      background: linear-gradient(155deg, var(--header-1) 0%, var(--header-2) 45%, var(--header-3) 80%, var(--header-4) 100%);
      border-bottom-left-radius: 22px;
      border-bottom-right-radius: 22px;
      box-shadow: 0 12px 30px rgba(60, 20, 5, 0.16);
    }

    .eyebrow {
      font-size: 10px;
      letter-spacing: 3.2px;
      text-transform: uppercase;
      color: rgba(255, 200, 100, 0.6);
      margin-bottom: 10px;
    }

    .hero-title {
      font-family: "Cormorant Garamond", serif;
      font-size: 46px;
      font-weight: 600;
      line-height: 1;
      letter-spacing: -1px;
      margin: 0 0 2px;
    }

    .hero-subtitle {
      font-family: "Cormorant Garamond", serif;
      font-size: 22px;
      font-style: italic;
      color: rgba(255, 215, 155, 0.92);
      margin-bottom: 12px;
    }

    .hero-meta {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.58);
      letter-spacing: 0.4px;
    }

    .pill-row,
    .tab-row,
    .segment-row {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: none;
    }

    .pill-row::-webkit-scrollbar,
    .tab-row::-webkit-scrollbar,
    .segment-row::-webkit-scrollbar {
      display: none;
    }

    .pill-row {
      margin-top: 14px;
    }

    .city-pill,
    .tab-pill,
    .segment-pill,
    .day-pill {
      white-space: nowrap;
      border-radius: 999px;
      border: 1px solid transparent;
      background: #fff;
    }

    .city-pill,
    .tab-pill {
      flex-shrink: 0;
    }

    .city-pill {
      padding: 6px 11px;
      font-size: 11px;
      font-weight: 600;
      background: rgba(255, 255, 255, 0.06);
      color: rgba(255, 255, 255, 0.72);
      border-color: rgba(255, 255, 255, 0.18);
    }

    .city-pill.active {
      background: rgba(255, 255, 255, 0.12);
      color: #fff;
    }

    .tabs-wrap {
      margin: 14px 14px 0;
    }

    .tab-pill {
      padding: 8px 11px;
      border: none;
      font-size: 11.5px;
      font-weight: 600;
      background: #ede8e0;
      color: #6b5748;
    }

    .tab-pill.active {
      background: #1a0800;
      color: #ffd080;
    }

    .content {
      padding: 12px 14px 40px;
    }

    .section-block {
      margin-bottom: 14px;
    }

    .section-title {
      margin-bottom: 12px;
    }

    .section-title .small {
      font-size: 10px;
      letter-spacing: 2.4px;
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .section-title .main {
      font-family: "Cormorant Garamond", serif;
      font-size: 25px;
      line-height: 1.05;
      color: #2d241b;
    }

    .section-title .sub {
      font-size: 11.5px;
      color: #7a6a5c;
      margin-top: 4px;
      line-height: 1.45;
    }

    .card {
      background: var(--paper);
      border: 1.5px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.04);
    }

    .compact-card {
      padding: 14px 15px;
      margin-bottom: 9px;
      border-radius: var(--radius-md);
    }

    .flight-card {
      padding: 14px 15px;
      border-radius: var(--radius-md);
      color: #fff;
      margin-bottom: 10px;
    }

    .flight-top {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .flight-type {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 1.4px;
    }

    .flight-route {
      font-size: 18px;
      font-weight: 800;
    }

    .flight-detail {
      font-size: 11.5px;
      color: rgba(255, 255, 255, 0.86);
      line-height: 1.75;
      white-space: pre-line;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 10px;
      padding: 10px 12px;
      background: #fff;
      border-radius: 12px;
      border: 1px solid var(--line);
      margin-bottom: 12px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      flex-shrink: 0;
    }

    .legend-label {
      font-size: 10.5px;
      color: #6b5748;
    }

    .day-card {
      margin-bottom: 10px;
      overflow: hidden;
    }

    .day-summary {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px 13px;
    }

    .day-index {
      width: 36px;
      height: 36px;
      flex-shrink: 0;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
    }

    .day-summary-main {
      flex: 1;
      min-width: 0;
    }

    .day-line {
      display: flex;
      align-items: center;
      gap: 5px;
      flex-wrap: wrap;
    }

    .day-date {
      font-size: 13px;
      font-weight: 700;
      color: var(--ink);
    }

    .day-dow {
      font-size: 11px;
      color: #b0a090;
    }

    .day-city {
      margin-left: auto;
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid currentColor;
    }

    .day-theme {
      font-size: 11.5px;
      color: #6b5c4e;
      margin-top: 2px;
      line-height: 1.4;
    }

    .chevron {
      color: #b0a090;
      font-size: 12px;
      transition: transform 0.2s ease;
    }

    .chevron.open {
      transform: rotate(180deg);
    }

    .chip-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      padding: 0 13px 10px;
    }

    .chip {
      padding: 3px 9px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 600;
      border: 1px solid currentColor;
    }

    .hotel-inline {
      margin: 0 13px 10px;
      padding: 10px 12px;
      border-radius: 12px;
      display: flex;
      gap: 10px;
      align-items: flex-start;
      border: 1px solid transparent;
    }

    .hotel-icon {
      font-size: 20px;
      line-height: 1;
    }

    .hotel-name {
      font-size: 12.5px;
      font-weight: 700;
    }

    .hotel-meta {
      font-size: 11px;
      color: #7a6a5c;
      margin-top: 2px;
      line-height: 1.45;
    }

    .timeline {
      padding: 2px 13px 14px;
    }

    .timeline-item {
      display: flex;
      gap: 9px;
      margin-bottom: 10px;
      padding-bottom: 10px;
      border-bottom: 1px solid #f2ede5;
    }

    .timeline-item:last-child {
      margin-bottom: 0;
      padding-bottom: 0;
      border-bottom: none;
    }

    .timeline-time {
      width: 38px;
      flex-shrink: 0;
      text-align: right;
      padding-top: 2px;
      font-size: 10px;
      color: #a09080;
      font-weight: 600;
    }

    .timeline-bar {
      width: 3px;
      min-height: 36px;
      flex-shrink: 0;
      border-radius: 2px;
      background: #ccc;
    }

    .timeline-main {
      flex: 1;
      min-width: 0;
    }

    .timeline-title {
      font-size: 12.5px;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 2px;
      line-height: 1.35;
    }

    .timeline-sub {
      font-size: 11px;
      color: #8a7566;
      line-height: 1.5;
    }

    .city-overview-card {
      overflow: hidden;
      margin-bottom: 12px;
    }

    .city-overview-head {
      padding: 14px 15px;
      border-bottom: 1px solid rgba(0, 0, 0, 0.04);
    }

    .city-overview-title {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .city-overview-title .emoji {
      font-size: 26px;
    }

    .city-overview-title .name {
      font-family: "Cormorant Garamond", serif;
      font-size: 22px;
      font-weight: 600;
    }

    .city-overview-stay {
      font-size: 11px;
      margin-top: 1px;
    }

    .city-overview-body {
      padding: 12px 15px;
    }

    .bullet-line {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      margin-bottom: 7px;
    }

    .bullet-line:last-child {
      margin-bottom: 0;
    }

    .bullet-dot {
      width: 5px;
      height: 5px;
      margin-top: 5px;
      border-radius: 999px;
      flex-shrink: 0;
    }

    .bullet-text {
      font-size: 12px;
      color: #4a3c30;
      line-height: 1.5;
    }

    .day-pills {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .day-pill {
      padding: 5px 10px;
      font-size: 11px;
      font-weight: 600;
      background: #fff;
    }

    .filter-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
      margin-bottom: 12px;
    }

    .filter-grid.two {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      margin-bottom: 14px;
    }

    .grid-pill {
      padding: 9px 8px;
      border-radius: 12px;
      border: none;
      font-size: 12px;
      font-weight: 700;
      color: #6b5748;
      background: #ede8e0;
    }

    .segment-pill {
      padding: 8px;
      border-width: 1.5px;
      border-style: solid;
      font-size: 12px;
      font-weight: 600;
      background: #fff;
      color: #8a7566;
      flex: 1;
    }

    .place-head {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .place-icon {
      font-size: 20px;
      line-height: 1;
    }

    .place-title {
      font-size: 13.5px;
      font-weight: 700;
      color: var(--ink);
    }

    .place-meta {
      font-size: 11px;
      color: #8a7566;
      margin-top: 1px;
      line-height: 1.45;
    }

    .place-line {
      font-size: 11.5px;
      color: #6b5748;
      margin-bottom: 5px;
      line-height: 1.5;
    }

    .place-note {
      font-size: 11.5px;
      color: #5a5040;
      line-height: 1.55;
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 9px;
    }

    .tag {
      font-size: 10.5px;
      font-weight: 600;
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid transparent;
    }

    .accent-label {
      display: inline-block;
      margin-top: 8px;
      font-size: 10.5px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid transparent;
    }

    .action-wrap {
      margin-bottom: 18px;
      background: #fffbeb;
      border: 1.5px solid #fde68a;
      border-radius: 14px;
      overflow: hidden;
    }

    .action-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 12px 14px;
    }

    .action-head-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .action-head-title {
      font-size: 12.5px;
      font-weight: 700;
      color: #92400e;
    }

    .action-list {
      padding: 0 14px 14px;
      display: grid;
      gap: 8px;
    }

    .action-card {
      background: #fff;
      border-radius: 12px;
      padding: 12px 13px;
      border: 1px solid #fde68a;
    }

    .action-card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .action-card-title {
      font-size: 12.5px;
      font-weight: 700;
    }

    .urgent {
      background: #fee2e2;
      color: #b91c1c;
      font-size: 9.5px;
      font-weight: 800;
      padding: 3px 7px;
      border-radius: 999px;
    }

    .action-card-desc {
      font-size: 11.2px;
      color: #7a6a5c;
      line-height: 1.45;
      margin-top: 5px;
    }

    .check-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 12px;
      background: #fff;
      border-radius: 10px;
      margin-bottom: 7px;
      border: 1.5px solid var(--line);
    }

    .check-row.done {
      opacity: 0.62;
      border-color: #bbf7d0;
    }

    .check-row input {
      width: 18px;
      height: 18px;
      margin-top: 2px;
      accent-color: #22c55e;
      flex-shrink: 0;
    }

    .check-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--ink);
    }

    .check-row.done .check-title {
      text-decoration: line-through;
    }

    .check-sub {
      font-size: 11px;
      color: #8a7566;
      margin-top: 2px;
      line-height: 1.45;
    }

    .hotel-card {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      padding: 13px 15px;
      margin-bottom: 8px;
      border-radius: 12px;
    }

    .hotel-card .hotel-icon {
      font-size: 24px;
    }

    .tip-card {
      padding: 14px 15px;
      margin-bottom: 9px;
      border-radius: 14px;
    }

    .tip-title {
      font-size: 13.5px;
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 6px;
    }

    .tip-body {
      font-size: 12.5px;
      color: #6b5c4e;
      line-height: 1.65;
    }

    .footer-banner {
      background: linear-gradient(135deg, #1a0800, #3d1408);
      border-radius: 14px;
      padding: 16px;
      margin-top: 4px;
      text-align: center;
      color: #fff;
    }

    .footer-banner .line-1 {
      font-family: "Cormorant Garamond", serif;
      font-size: 20px;
      font-style: italic;
      color: rgba(255, 215, 150, 0.9);
    }

    .footer-banner .line-2 {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.5);
      margin-top: 4px;
    }

    .empty-state {
      padding: 18px 16px;
      background: #fff;
      border: 1px dashed #d8cec2;
      border-radius: 14px;
      font-size: 12px;
      color: #7a6a5c;
      line-height: 1.6;
    }

    @media (max-width: 420px) {
      .hero-title {
        font-size: 40px;
      }

      .hero-subtitle {
        font-size: 20px;
      }

      .filter-grid {
        grid-template-columns: 1fr;
      }

      .filter-grid.two {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>

        return [];
      }

        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");

      return HOTELS.find((hotel) => hotel.city === city);

      if (isDone(name)) {
        STATE.doneItems = STATE.doneItems.filter((item) => item !== name);

      }
      saveDoneItems(STATE.doneItems);
      renderApp();
    }

        if (!visibleDays.some((day) => day.dayNumber === STATE.openDay) && visibleDays.length) {
          STATE.openDay = visibleDays[0].dayNumber;

        renderApp();
      },
      toggleDay(dayNumber) {
        STATE.openDay = STATE.openDay === dayNumber ? null : dayNumber;
        renderApp();

            return `
              <div class="card hotel-card" style="border-color:${cfg.border}55;">
                <div class="hotel-icon">${cfg.emoji}</div>
                <div>
                  <div class="hotel-name">${escapeHtml(hotel.name)}</div>
                  <div class="hotel-meta">${escapeHtml(hotel.dates)} • ${hotel.nights} nights • ${escapeHtml(hotel.area)}</div>
                </div>
              </div>
            `;
          }).join("")}
        </section>
      `;
    }

    function renderTipsTab() {
      return `
        <section class="section-block fade-in">
          ${renderSectionTitle({
            eyebrow: "Practical",
            title: "Japan tips",
            subtitle: "Your original guidance stays here, with the shared data sections living above it.",
            color: "#155E3E"
          })}

          ${TIPS.map(
            (tip) => `
              <div class="card tip-card">
                <div class="tip-title">${escapeHtml(tip.icon)} ${escapeHtml(tip.title)}</div>
                <div class="tip-body">${escapeHtml(tip.body)}</div>
              </div>
            `
          ).join("")}

          <div class="footer-banner">
            <div class="line-1">Osaka • Kyoto • Tokyo</div>
            <div class="line-2">25 Nov – 7 Dec 2026 • 13 Days • 12 Nights</div>
          </div>
        </section>
      `;
    }

    function renderActiveTab() {
      switch (STATE.tab) {
        case "schedule":
          return renderScheduleTab();
        case "cities":
          return renderCitiesTab();
        case "food":
          return renderFoodTab();
        case "shopping":
          return renderShoppingTab();
        case "prep":
          return renderPrepTab();
        case "tips":
          return renderTipsTab();
        default:
          return renderScheduleTab();
      }
    }

    function renderApp() {
      document.getElementById("app").innerHTML = `
        ${renderHeader()}
        ${renderTabBar()}
        <main class="content">
          ${renderActiveTab()}
        </main>
      `;
    }

    renderApp();
  </script>
</body>
</html>
