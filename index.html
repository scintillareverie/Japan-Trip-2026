function badgeColor(type){return TYPE[type]||'#999'}
function Cfg(city){return CITY[city]}

function Header({city,setCity}){
  const pills=['all','osaka','kyoto','tokyo'];
  return <div className="top"><div className="kicker">Singapore Airlines · CGK → KIX → HND → CGK</div><h1 className="title">Japan 2026</h1><div className="sub">Osaka · Kyoto · Tokyo</div><div className="meta">25 Nov – 7 Dec 2026 · 13 Days · 12 Nights</div><div className="chips">{pills.map(p=><button key={p} className={`chip press ${city===p?'on':''}`} onClick={()=>setCity(p)}>{p==='all'?'All Cities':Cfg(p)?.name||'All Cities'}</button>)}</div></div>
}
function Tabs({tab,setTab}){return <div className="tabs">{[{id:'schedule',l:'Schedule'},{id:'restaurants',l:'Restaurants'},{id:'shopping',l:'Shopping'},{id:'prep',l:'Prep'},{id:'tips',l:'Tips'}].map(t=><button key={t.id} className={`tab press ${tab===t.id?'on':''}`} onClick={()=>setTab(t.id)}>{t.l}</button>)}</div>}

function DayCard({day,open,setOpen}){const c=Cfg(day.city);return <div className={`day ${open?'open':''}`}><div className="press hdr2" onClick={()=>setOpen(open?null:day.n)}><div className="num" style={{background:c.color}}>{day.n}</div><div className="mid"><div className="dttl">{day.date} · {day.dow} <span style={{fontWeight:700,color:c.color}}>· {c.name}</span></div><div className="dsub">{day.theme}</div><div className="dtags">{day.tags.map(t=><span key={t} className="tag">{t}</span>)}</div></div><div className="chev">▼</div></div><div className="body"><div className="hotelbox">{day.hotel&&<div className="hotelbar"><div className="hi">🏨</div><div><div className="hn">{day.hotel.name}</div><div className="hd">{day.hotel.dates} · {day.hotel.nights} nights · {day.hotel.area}</div></div></div>}{day.hotelEnd&&<div className="hotelbar"><div className="hi">📍</div><div><div className="hn">Check-out {day.hotelEnd.name}</div><div className="hd">{day.hotelEnd.dates}</div></div></div>}</div><div className="timeline">{day.items.map((it,i)=><div className="tl" key={i}><div className="tt">{it.time}</div><div className="tttl">{it.title}</div><div className="td">{it.desc}</div>{it.trans&&it.trans.map((tr,j)=><span key={j} className="trans" style={{background:'#f4efe8'}}>{tr}</span>)}{it.tip&&<div className="tip">💡 {it.tip}</div>}</div>)}</div></div></div>}

function Schedule({city,open,setOpen}){const list=useMemo(()=>city==='all'?DAYS:DAYS.filter(d=>d.city===city),[city]);return <div className="fade"><div className="banner dep"><div className="flrow"><span className="badge dep">DEPART</span><span className="apt">CGK</span><span className="arrow">→</span><span className="apt">KIX</span></div><div className="grid"><div className="item"><div className="k">Date</div><div className="v">Wed, 25 Nov 2026</div></div><div className="item"><div className="k">Time</div><div className="v">08:35</div></div><div className="item"><div className="k">Flight</div><div className="v">Singapore Airlines SQ618</div></div><div className="item"><div className="k">Duration / Transit</div><div className="v">~8h 20m total · transit via Singapore</div></div></div><div className="note">Haruka train KIX → Shin-Osaka ~50 min · then subway Shin-Osaka → Namba ~20 min.</div></div><div className="banner ret" style={{marginTop:16}}><div className="flrow"><span className="badge ret">RETURN</span><span className="apt">HND</span><span className="arrow">→</span><span className="apt">CGK</span></div><div className="grid"><div className="item"><div className="k">Date</div><div className="v">Mon, 7 Dec 2026</div></div><div className="item"><div className="k">Time</div><div className="v">20:20</div></div><div className="item"><div className="k">Flight</div><div className="v">Singapore Airlines SQxxx</div></div><div className="item"><div className="k">Duration / Transit</div><div className="v">~8–9 hr total · transit via Singapore</div></div></div><div className="note">Keikyu Line Shinagawa → Haneda ~13 min. Leave hotel by 17:00.</div></div><div style={{marginTop:12}}>{list.map(d=><DayCard key={d.n} day={d} open={open===d.n} setOpen={setOpen}/>)}</div></div>}

function Card({p,city}){const c=Cfg(city);return <div className="r-card open"><div className="rhead"><div className="ricon">{p.icon}</div><div className="rpi"><div className="rname">{p.name}</div><div className="rtype">{p.type}</div><div className="rmeta"><span className="station">{p.station} · {p.walk}</span><span className="b">{p.hours}</span></div></div></div><div className="rdet"><div className="dlbl">Recommended items</div><div className="orders">{p.orders?.map(o=><span className="order" key={o}>{o}</span>)}</div><div className="mgrid"><div className="mitem"><div className="k">Address</div><div className="v">{p.addr}</div></div><div className="mitem"><div className="k">City</div><div className="v" style={{color:c.color}}>{c.name}</div></div></div>{p.branch?.length?<><div className="dlbl">Other branches</div><div className="branch">{p.branch.map((b,i)=><div className="brow" key={i}><span className={`bcity ${i%3===0?'os':i%3===1?'ky':'to'}`}>{b.includes('Tokyo')?'Tokyo':b.includes('Kyoto')?'Kyoto':b.includes('Osaka')?'Osaka':'Branch'}</span><span>{b}</span></div>)}</div></>:null}</div></div>}
function Restaurants({city,setCity}){const list=city==='all'?[...RESTAURANTS.osaka,...RESTAURANTS.kyoto,...RESTAURANTS.tokyo]:RESTAURANTS[city];const [section,setSection]=useState('restaurant');return <div className="fade"><div className="rbtns"><button className={`rbtn ${city==='all'?'on':''}`} onClick={()=>setCity('all')}>All</button><button className={`rbtn os ${city==='osaka'?'on':''}`} onClick={()=>setCity('osaka')}>Osaka</button><button className={`rbtn ky ${city==='kyoto'?'on':''}`} onClick={()=>setCity('kyoto')}>Kyoto</button><button className={`rbtn to ${city==='tokyo'?'on':''}`} onClick={()=>setCity('tokyo')}>Tokyo</button></div><div>{list.map((p,i)=><Card key={i} p={p} city={city==='all'?(p.station.includes('Station')&&p.addr.includes('Tokyo')?'tokyo':p.addr.includes('Kyoto')?'kyoto':'osaka'):city}/>)}</div></div>}

function ShopCard({s,city}){const c=Cfg(city);return <div className="s-card open"><div className="shead"><div className="ricon">{s.icon}</div><div className="rpi"><div className="rname">{s.name}</div><div className="rtype">Nearest station: {s.station}</div><div className="rmeta"><span className="station">Walk: {s.walk}</span><span className="b">{s.hours}</span></div></div></div><div className="sdet"><div className="dlbl">Recommended items</div><div className="orders">{s.items.map(o=><span className="order" key={o}>{o}</span>)}</div></div></div>}
function Shopping({city,setCity}){const list=city==='all'?Object.entries(SHOPS).flatMap(([k,v])=>v.map(x=>({...x,_city:k}))):SHOPS[city].map(x=>({...x,_city:city}));return <div className="fade"><div className="rbtns"><button className={`rbtn ${city==='all'?'on':''}`} onClick={()=>setCity('all')}>All</button><button className={`rbtn os ${city==='osaka'?'on':''}`} onClick={()=>setCity('osaka')}>Osaka</button><button className={`rbtn ky ${city==='kyoto'?'on':''}`} onClick={()=>setCity('kyoto')}>Kyoto</button><button className={`rbtn to ${city==='tokyo'?'on':''}`} onClick={()=>setCity('tokyo')}>Tokyo</button></div><div>{list.map((s,i)=><ShopCard key={i} s={s} city={s._city}/>)}</div></div>}

function Prep(){return <div className="fade"><div className="lbl">Before departure</div>{['Get ICOCA at KIX','Arrange SIM / pocket Wi‑Fi','Exchange some yen','Download offline maps','Download Google Translate pack','Pack Type A adapter','Bring power bank','Layering clothes for cold weather'].map(x=><div className="tipcard" key={x}><div className="tipttl">{x}</div><div className="tipbody">Keep it simple: do it before the flight so you don’t have to think later.</div></div>)}</div>}
function Tips(){return <div className="tips fade"><div className="lbl">Practical tips</div>{TIPS.map(t=><div className="tipcard" key={t.t}><div className="tipttl">{t.t}</div><div className="tipbody">{t.b}</div></div>)}<div className="footer"><div className="f1">Osaka · Kyoto · Tokyo</div><div className="f2">Cleaned itinerary version</div></div></div>}

function App(){const [city,setCity]=useState('all');const [tab,setTab]=useState('schedule');const [open,setOpen]=useState(1);return <div className="wrap"><Header city={city} setCity={setCity}/><Tabs tab={tab} setTab={setTab}/><div className="main">{tab==='schedule'&&<Schedule city={city} open={open} setOpen={setOpen}/>} {tab==='restaurants'&&<Restaurants city={city} setCity={setCity}/>} {tab==='shopping'&&<Shopping city={city} setCity={setCity}/>} {tab==='prep'&&<Prep/>} {tab==='tips'&&<Tips/>}</div></div>}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
