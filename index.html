<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Japan Trip 2026 Preview</title>
  <style>
   @import url("https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,700&family=Prata&display=swap");

    :root {
      --bg: #faf8f3;
      --paper: #ffffff;
      --ink: #1a1208;
      --muted: #8a7566;
      --muted-2: #6b5748;
      --line: #ede8e0;
      --gold: #ffd080;
      --header-1: #1a0800;
      --header-2: #3b1306;
      --header-3: #6a1f0e;
      --header-4: #8c3514;
      --shadow: 0 10px 30px rgba(60, 20, 5, 0.12);
      --radius-lg: 16px;
      --radius-md: 14px;
      --radius-sm: 12px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: "DM Sans", -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    button,
    input {
      font: inherit;
    }

    .app-shell {
      max-width: 560px;
      margin: 0 auto;
      min-height: 100vh;
      background: var(--bg);
    }

    .fade-in {
      animation: fadeIn 0.22s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(4px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .pressable {
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease, background 0.2s ease, border-color 0.2s ease;
    }

    .pressable:active {
      transform: scale(0.985);
      opacity: 0.85;
    }

    ::-webkit-scrollbar {
      width: 4px;
      height: 4px;
    }

    ::-webkit-scrollbar-thumb {
      background: #d4c4b0;
      border-radius: 999px;
    }

    .header {
      position: sticky;
      top: 0;
      z-index: 10;
      padding: 42px 22px 18px;
      color: #fff;
      background: linear-gradient(155deg, var(--header-1) 0%, var(--header-2) 45%, var(--header-3) 80%, var(--header-4) 100%);
      border-bottom-left-radius: 22px;
      border-bottom-right-radius: 22px;
      box-shadow: 0 12px 30px rgba(60, 20, 5, 0.16);
    }

    .eyebrow {
      font-size: 10px;
      letter-spacing: 3.2px;
      text-transform: uppercase;
      color: rgba(255, 200, 100, 0.6);
      margin-bottom: 10px;
    }

    .hero-title {
      font-family: "Prata", serif;
      font-size: 48px;
      font-weight: 400;
      line-height: 1.1;
      letter-spacing: -0.5px;
      margin: 0 0 12px; /* Increased from 2px to 12px for perfect breathing room */
    }

    .hero-subtitle {
      font-family: "DM Sans", sans-serif; /* Switched to clean sans-serif for premium contrast */
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 3px; /* Tracked out wide for a high-end designer look */
      color: rgba(255, 215, 155, 0.95);
      margin-bottom: 16px;
    }

    .hero-meta {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.58);
      letter-spacing: 0.4px;
    }

    .pill-row,
    .tab-row,
    .segment-row {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: none;
    }

    .pill-row::-webkit-scrollbar,
    .tab-row::-webkit-scrollbar,
    .segment-row::-webkit-scrollbar {
      display: none;
    }

    .pill-row {
      margin-top: 14px;
    }

    .city-pill,
    .tab-pill,
    .segment-pill,
    .day-pill {
      white-space: nowrap;
      border-radius: 999px;
      border: 1px solid transparent;
      background: #fff;
    }

    .city-pill,
    .tab-pill {
      flex-shrink: 0;
    }

    .city-pill {
      padding: 6px 11px;
      font-size: 11px;
      font-weight: 600;
      background: rgba(255, 255, 255, 0.06);
      color: rgba(255, 255, 255, 0.72);
      border-color: rgba(255, 255, 255, 0.18);
    }

    .city-pill.active {
      background: rgba(255, 255, 255, 0.12);
      color: #fff;
    }

    .tabs-wrap {
      margin: 14px 14px 0;
    }

    .tab-pill {
      padding: 8px 11px;
      border: none;
      font-size: 11.5px;
      font-weight: 600;
      background: #ede8e0;
      color: #6b5748;
    }

    .tab-pill.active {
      background: #1a0800;
      color: #ffd080;
    }

    .content {
      padding: 12px 14px 40px;
    }

    .section-block {
      margin-bottom: 14px;
    }

    .section-title {
      margin-bottom: 12px;
    }

    .section-title .small {
      font-size: 10px;
      letter-spacing: 2.4px;
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .section-title .main {
      font-family: "Cormorant Garamond", serif;
      font-size: 25px;
      line-height: 1.05;
      color: #2d241b;
    }

    .section-title .sub {
      font-size: 11.5px;
      color: #7a6a5c;
      margin-top: 4px;
      line-height: 1.45;
    }

    .card {
      background: var(--paper);
      border: 1.5px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.04);
    }

    .compact-card {
      padding: 14px 15px;
      margin-bottom: 9px;
      border-radius: var(--radius-md);
    }

    .flight-card {
      padding: 14px 15px;
      border-radius: var(--radius-md);
      color: #fff;
      margin-bottom: 10px;
    }

    .flight-top {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .flight-type {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 1.4px;
    }

    .flight-route {
      font-size: 18px;
      font-weight: 800;
    }

    .flight-detail {
      font-size: 11.5px;
      color: rgba(255, 255, 255, 0.86);
      line-height: 1.75;
      white-space: pre-line;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 10px;
      padding: 10px 12px;
      background: #fff;
      border-radius: 12px;
      border: 1px solid var(--line);
      margin-bottom: 12px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      flex-shrink: 0;
    }

    .legend-label {
      font-size: 10.5px;
      color: #6b5748;
    }

    .day-card {
      margin-bottom: 10px;
      overflow: hidden;
    }

    .day-summary {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px 13px;
    }

    .day-index {
      width: 36px;
      height: 36px;
      flex-shrink: 0;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
    }

    .day-summary-main {
      flex: 1;
      min-width: 0;
    }

    .day-line {
      display: flex;
      align-items: center;
      gap: 5px;
      flex-wrap: wrap;
    }

    .day-date {
      font-size: 13px;
      font-weight: 700;
      color: var(--ink);
    }

    .day-dow {
      font-size: 11px;
      color: #b0a090;
    }

    .day-city {
      margin-left: auto;
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid currentColor;
    }

    .day-theme {
      font-size: 11.5px;
      color: #6b5c4e;
      margin-top: 2px;
      line-height: 1.4;
    }

    .chevron {
      color: #b0a090;
      font-size: 12px;
      transition: transform 0.2s ease;
    }

    .chevron.open {
      transform: rotate(180deg);
    }

    .chip-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      padding: 0 13px 10px;
    }

    .chip {
      padding: 3px 9px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 600;
      border: 1px solid currentColor;
    }

    .hotel-inline {
      margin: 0 13px 10px;
      padding: 10px 12px;
      border-radius: 12px;
      display: flex;
      gap: 10px;
      align-items: flex-start;
      border: 1px solid transparent;
    }

    .hotel-icon {
      font-size: 20px;
      line-height: 1;
    }

    .hotel-name {
      font-size: 12.5px;
      font-weight: 700;
    }

    .hotel-meta {
      font-size: 11px;
      color: #7a6a5c;
      margin-top: 2px;
      line-height: 1.45;
    }

    .timeline {
      padding: 2px 13px 14px;
    }

    .timeline-item {
      display: flex;
      gap: 9px;
      margin-bottom: 10px;
      padding-bottom: 10px;
      border-bottom: 1px solid #f2ede5;
    }

    .timeline-item:last-child {
      margin-bottom: 0;
      padding-bottom: 0;
      border-bottom: none;
    }

    .timeline-time {
      width: 38px;
      flex-shrink: 0;
      text-align: right;
      padding-top: 2px;
      font-size: 10px;
      color: #a09080;
      font-weight: 600;
    }

    .timeline-bar {
      width: 3px;
      min-height: 36px;
      flex-shrink: 0;
      border-radius: 2px;
      background: #ccc;
    }

    .timeline-main {
      flex: 1;
      min-width: 0;
    }

    .timeline-title {
      font-size: 12.5px;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 2px;
      line-height: 1.35;
    }

    .timeline-sub {
      font-size: 11px;
      color: #8a7566;
      line-height: 1.5;
    }

    .city-overview-card {
      overflow: hidden;
      margin-bottom: 12px;
    }

    .city-overview-head {
      padding: 14px 15px;
      border-bottom: 1px solid rgba(0, 0, 0, 0.04);
    }

    .city-overview-title {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .city-overview-title .emoji {
      font-size: 26px;
    }

    .city-overview-title .name {
      font-family: "Cormorant Garamond", serif;
      font-size: 22px;
      font-weight: 600;
    }

    .city-overview-stay {
      font-size: 11px;
      margin-top: 1px;
    }

    .city-overview-body {
      padding: 12px 15px;
    }

    .bullet-line {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      margin-bottom: 7px;
    }

    .bullet-line:last-child {
      margin-bottom: 0;
    }

    .bullet-dot {
      width: 5px;
      height: 5px;
      margin-top: 5px;
      border-radius: 999px;
      flex-shrink: 0;
    }

    .bullet-text {
      font-size: 12px;
      color: #4a3c30;
      line-height: 1.5;
    }

    .day-pills {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .day-pill {
      padding: 5px 10px;
      font-size: 11px;
      font-weight: 600;
      background: #fff;
    }

    .filter-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
      margin-bottom: 12px;
    }

    .filter-grid.two {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      margin-bottom: 14px;
    }

    .grid-pill {
      padding: 9px 8px;
      border-radius: 12px;
      border: none;
      font-size: 12px;
      font-weight: 700;
      color: #6b5748;
      background: #ede8e0;
    }

    .segment-pill {
      padding: 8px;
      border-width: 1.5px;
      border-style: solid;
      font-size: 12px;
      font-weight: 600;
      background: #fff;
      color: #8a7566;
      flex: 1;
    }

    .place-head {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .place-icon {
      font-size: 20px;
      line-height: 1;
    }

    .place-title {
      font-size: 13.5px;
      font-weight: 700;
      color: var(--ink);
    }

    .place-meta {
      font-size: 11px;
      color: #8a7566;
      margin-top: 1px;
      line-height: 1.45;
    }

    .place-line {
      font-size: 11.5px;
      color: #6b5748;
      margin-bottom: 5px;
      line-height: 1.5;
    }

    .place-note {
      font-size: 11.5px;
      color: #5a5040;
      line-height: 1.55;
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 9px;
    }

    .tag {
      font-size: 10.5px;
      font-weight: 600;
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid transparent;
    }

    .accent-label {
      display: inline-block;
      margin-top: 8px;
      font-size: 10.5px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid transparent;
    }

    .action-wrap {
      margin-bottom: 18px;
      background: #fffbeb;
      border: 1.5px solid #fde68a;
      border-radius: 14px;
      overflow: hidden;
    }

    .action-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 12px 14px;
    }

    .action-head-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .action-head-title {
      font-size: 12.5px;
      font-weight: 700;
      color: #92400e;
    }

    .action-list {
      padding: 0 14px 14px;
      display: grid;
      gap: 8px;
    }

    .action-card {
      background: #fff;
      border-radius: 12px;
      padding: 12px 13px;
      border: 1px solid #fde68a;
    }

    .action-card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .action-card-title {
      font-size: 12.5px;
      font-weight: 700;
    }

    .urgent {
      background: #fee2e2;
      color: #b91c1c;
      font-size: 9.5px;
      font-weight: 800;
      padding: 3px 7px;
      border-radius: 999px;
    }

    .action-card-desc {
      font-size: 11.2px;
      color: #7a6a5c;
      line-height: 1.45;
      margin-top: 5px;
    }

    .check-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 12px;
      background: #fff;
      border-radius: 10px;
      margin-bottom: 7px;
      border: 1.5px solid var(--line);
    }

    .check-row.done {
      opacity: 0.62;
      border-color: #bbf7d0;
    }

    .check-row input {
      width: 18px;
      height: 18px;
      margin-top: 2px;
      accent-color: #22c55e;
      flex-shrink: 0;
    }

    .check-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--ink);
    }

    .check-row.done .check-title {
      text-decoration: line-through;
    }

    .check-sub {
      font-size: 11px;
      color: #8a7566;
      margin-top: 2px;
      line-height: 1.45;
    }

    .hotel-card {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      padding: 13px 15px;
      margin-bottom: 8px;
      border-radius: 12px;
    }

    .hotel-card .hotel-icon {
      font-size: 24px;
    }

    .tip-card {
      padding: 14px 15px;
      margin-bottom: 9px;
      border-radius: 14px;
    }

    .tip-title {
      font-size: 13.5px;
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 6px;
    }

    .tip-body {
      font-size: 12.5px;
      color: #6b5c4e;
      line-height: 1.65;
    }

    .footer-banner {
      background: linear-gradient(135deg, #1a0800, #3d1408);
      border-radius: 14px;
      padding: 16px;
      margin-top: 4px;
      text-align: center;
      color: #fff;
    }

    .footer-banner .line-1 {
      font-family: "Cormorant Garamond", serif;
      font-size: 20px;
      font-style: italic;
      color: rgba(255, 215, 150, 0.9);
    }

    .footer-banner .line-2 {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.5);
      margin-top: 4px;
    }

    .empty-state {
      padding: 18px 16px;
      background: #fff;
      border: 1px dashed #d8cec2;
      border-radius: 14px;
      font-size: 12px;
      color: #7a6a5c;
      line-height: 1.6;
    }

    @media (max-width: 420px) {
      .hero-title {
        font-size: 40px;
      }

      .hero-subtitle {
        font-size: 20px;
      }

      .filter-grid {
        grid-template-columns: 1fr;
      }

      .filter-grid.two {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>

    function loadDoneItems() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
        return Array.isArray(saved) ? saved : [];
      } catch (error) {
        return [];
      }
    }

    function saveDoneItems(items) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
    }

    function getCityCfg(city) {
      return CITY_CFG[city] || CITY_CFG.Transit;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function hotelForCity(city) {
      return HOTELS.find((hotel) => hotel.city === city);
    }

    function isDone(name) {
      return STATE.doneItems.includes(name);
    }

    function toggleDone(name) {
      if (isDone(name)) {
        STATE.doneItems = STATE.doneItems.filter((item) => item !== name);
      } else {
        STATE.doneItems = [...STATE.doneItems, name];
      }
      saveDoneItems(STATE.doneItems);
      renderApp();
    }

      setTab(tab) {
        STATE.tab = tab;
        renderApp();

      setCityFilter(city) {
        STATE.cityFilter = city;
        const visibleDays = getFilteredDays();
        if (!visibleDays.some((day) => day.dayNumber === STATE.openDay) && visibleDays.length) {
          STATE.openDay = visibleDays[0].dayNumber;
        }
        renderApp();
      },
      toggleDay(dayNumber) {
        STATE.openDay = STATE.openDay === dayNumber ? null : dayNumber;
        renderApp();
      },
      jumpToDay(dayNumber) {
        STATE.tab = "schedule";
        STATE.openDay = dayNumber;

        STATE.cityFilter = target ? target.city : "All";

      const cfg = getCityCfg(day.city);
      const hotel = hotelForCity(day.city);
      const isOpen = STATE.openDay === day.dayNumber;

      return `
        <div class="card day-card" style="border-color:${isOpen ? cfg.border : "#EDE8E0"};">
          <div
            class="day-summary pressable"
            style="background:${isOpen ? cfg.bg : "#fff"};"
            onclick="appActions.toggleDay(${day.dayNumber})"
          >
            <div class="day-index" style="background:${isOpen ? cfg.color : "#EDE8E0"}; color:${isOpen ? "#fff" : "#8A7566"};">
              ${day.dayNumber}
            </div>

            <div class="day-summary-main">
              <div class="day-line">
                <span class="day-date">${escapeHtml(day.date)}</span>
                <span class="day-dow">${escapeHtml(day.dow)}</span>
                <span
                  class="day-city"
                  style="color:${cfg.color}; background:${cfg.bg}; border-color:${cfg.border};"
                >
                  ${escapeHtml(day.city)}
                </span>
              </div>
              <div class="day-theme">${escapeHtml(day.emoji)} ${escapeHtml(day.title)}</div>
            </div>

            <div class="chevron ${isOpen ? "open" : ""}">⌄</div>
          </div>

          ${
            isOpen
              ? `
            <div class="fade-in">
              <div class="chip-wrap">
                ${day.tags
                  .map(
                    (tag) => `
                      <span class="chip" style="color:${cfg.color}; background:${cfg.bg}; border-color:${cfg.border};">
                        ${escapeHtml(tag)}
                      </span>
                    `
                  )
                  .join("")}
              </div>

              ${
                hotel
                  ? `
                <div class="hotel-inline" style="background:${cfg.bg}; border-color:${cfg.border};">
                  <div class="hotel-icon">🏨</div>
                  <div>
                    <div class="hotel-name" style="color:${cfg.deep};">${escapeHtml(hotel.name)}</div>
                    <div class="hotel-meta">${escapeHtml(hotel.dates)} • ${hotel.nights} nights • ${escapeHtml(hotel.area)}</div>
                  </div>
                </div>
              `
                  : ""
              }

              <div class="timeline">
                ${day.events
                  .map(
                    (event) => `
                      <div class="timeline-item">
                        <div class="timeline-time">${escapeHtml(event.time)}</div>
                        <div class="timeline-bar" style="background:${TYPE_COLOR[event.type] || "#CCC"};"></div>
                        <div class="timeline-main">
                          <div class="timeline-title">${escapeHtml(event.icon)} ${escapeHtml(event.title)}</div>
                          <div class="timeline-sub">${escapeHtml(event.sub)}</div>
                        </div>
                      </div>
                    `
                  )
                  .join("")}
              </div>
            </div>
          `
              : ""
          }
        </div>
      `;
    }

    function renderScheduleTab() {
      const days = getFilteredDays();

      return `
        <section class="section-block fade-in">
          ${FLIGHTS.map(renderFlightCard).join("")}
          ${renderLegend()}
          ${days.map(renderDayCard).join("")}
        </section>
      `;
    }

    function renderCitiesTab() {
      return `
        <section class="section-block fade-in">
          ${renderSectionTitle({
            eyebrow: "Trip overview",
            title: "Cities",
            subtitle: "Your three bases and what makes each one worth lingering in.",
            color: "#7C2D12"
          })}

          ${CITY_OVERVIEW.map((city) => {
            const cfg = getCityCfg(city.name);
            return `
              <div class="card city-overview-card" style="border-color:${cfg.border}55;">
                <div class="city-overview-head" style="background:${cfg.bg}; border-bottom-color:${cfg.border}55;">
                  <div class="city-overview-title">
                    <span class="emoji">${escapeHtml(city.emoji)}</span>
                    <div>
                      <div class="name" style="color:${cfg.deep};">${escapeHtml(city.name)}</div>
                      <div class="city-overview-stay" style="color:${cfg.color};">${escapeHtml(city.stay)}</div>
                    </div>
                  </div>
                </div>

                <div class="city-overview-body">
                  ${city.vibes
                    .map(
                      (vibe) => `
                        <div class="bullet-line">
                          <span class="bullet-dot" style="background:${cfg.color};"></span>
                          <div class="bullet-text">${escapeHtml(vibe)}</div>
                        </div>
                      `
                    )
                    .join("")}

                  <div class="day-pills">
                    ${city.dayNumbers
                      .map(
                        (dayNumber) => `
                          <button
                            class="day-pill pressable"
                            style="border-color:${cfg.border}; background:${cfg.bg}; color:${cfg.color};"
                            onclick="appActions.jumpToDay(${dayNumber})"
                          >
                            Day ${dayNumber}
                          </button>
                        `
                      )
                      .join("")}
                  </div>
                </div>
              </div>
            `;
          }).join("")}
        </section>
      `;
    }

    function getFoodPlaces() {
      return PLACES.filter(
        (place) =>
          place.section === "food" &&
          place.city === STATE.foodCity &&
          place.category === STATE.foodCategory
      );
    }

    function getShoppingPlaces() {
      return PLACES.filter(
        (place) => place.section === "shopping" && place.city === STATE.shoppingCity
      );
    }

    function renderPlaceCard(place, city) {
      const cfg = getCityCfg(city);

      return `
        <div class="card compact-card" style="border-color:${cfg.border}55;">
          <div class="place-head">
            <span class="place-icon">${escapeHtml(place.icon || "📍")}</span>
            <div>
              <div class="place-title">${escapeHtml(place.name)}</div>
              <div class="place-meta">
                ${escapeHtml(place.area)} • ${escapeHtml(place.category)}${place.priceRange ? ` • ${escapeHtml(place.priceRange)}` : ""}
              </div>
            </div>
          </div>

          <div class="place-line">
            ${place.openingHours ? `${escapeHtml(place.openingHours)}` : ""}
            ${place.station ? `&nbsp;&nbsp;&nbsp;&nbsp;${escapeHtml(place.station)}` : ""}
            ${place.walk ? ` • ${escapeHtml(place.walk)}` : ""}
          </div>

          ${
            place.bestFor
              ? `
                <div class="place-line" style="margin-bottom:6px;">
                  Best for: ${escapeHtml(place.bestFor)}
                </div>
              `
              : ""
          }

          <div class="place-note">${escapeHtml(place.notes || "")}</div>

          ${
            place.tags && place.tags.length
              ? `
                <div class="tag-row">
                  ${place.tags
                    .map(
                      (tag) => `
                        <span class="tag" style="background:${cfg.bg}; color:${cfg.color}; border-color:${cfg.border};">
                          ${escapeHtml(tag)}
                        </span>
                      `
                    )
                    .join("")}
                </div>
              `
              : ""
          }
        </div>
      `;
    }

    function renderFoodTab() {
      const cards = getFoodPlaces();

      return `
        <section class="section-block fade-in">
          ${renderSectionTitle({
            eyebrow: "Curated Eats",
            title: "Food & Cafés",
            subtitle: "Specialty coffee roasters, retro kissatens, and local dining spots sorted by city.",
            color: "#2563EB"
          })}

          <div class="filter-grid">
            ${["Osaka", "Kyoto", "Tokyo"]
              .map((city) => {
                const cfg = getCityCfg(city);
                const active = STATE.foodCity === city;
                return `
                  <button
                    class="grid-pill pressable"
                    style="background:${active ? cfg.color : "#EDE8E0"}; color:${active ? "#fff" : "#6B5748"};"
                    onclick="appActions.setFoodCity('${city}')"
                  >
                    ${escapeHtml(city)}
                  </button>
                `;
              })
              .join("")}
          </div>

          <div class="filter-grid two">
            ${[
              { id: "cafe", label: "Cafés" },
              { id: "restaurant", label: "Restaurants" }
            ]
              .map((segment) => {
                const cfg = getCityCfg(STATE.foodCity);
                const active = STATE.foodCategory === segment.id;
                return `
                  <button
                    class="segment-pill pressable"
                    style="border-color:${active ? cfg.color : "#EDE8E0"}; background:${active ? cfg.bg : "#fff"}; color:${active ? cfg.color : "#8A7566"};"
                    onclick="appActions.setFoodCategory('${segment.id}')"
                  >
                    ${escapeHtml(segment.label)}
                  </button>
                `;
              })
              .join("")}
          </div>

          ${
            cards.length
              ? cards.map((place) => renderPlaceCard(place, STATE.foodCity)).join("")
              : `<div class="empty-state">No places in this category yet. Add a new object inside the PLACES data block.</div>`
          }
        </section>
      `;
    }

    function renderShoppingTab() {
      const places = getShoppingPlaces();

      return `
        <section class="section-block fade-in">
          ${renderSectionTitle({
            eyebrow: "By city",
            title: "Shopping",
            subtitle: "Opening hours, nearest station and walking distance, plus recommended items for each stop.",
            color: "#7C3AED"
          })}

          <div class="filter-grid">
            ${["Osaka", "Kyoto", "Tokyo"]
              .map((city) => {
                const cfg = getCityCfg(city);
                const active = STATE.shoppingCity === city;
                return `
                  <button
                    class="grid-pill pressable"
                    style="background:${active ? cfg.color : "#EDE8E0"}; color:${active ? "#fff" : "#6B5748"};"
                    onclick="appActions.setShoppingCity('${city}')"
                  >
                    ${escapeHtml(city)}
                  </button>
                `;
              })
              .join("")}
          </div>

          ${places
            .map((place) => {
              const cfg = getCityCfg(STATE.shoppingCity);
              return `
                <div class="card compact-card" style="border-color:${cfg.border}55;">
                  <div class="place-head">
                    <span class="place-icon">${escapeHtml(place.icon || "🛍️")}</span>
                    <div>
                      <div class="place-title">${escapeHtml(place.name)}</div>
                      <div class="place-meta">${escapeHtml(place.area)}${place.priceRange ? ` • ${escapeHtml(place.priceRange)}` : ""}</div>
                    </div>
                  </div>
                  <div class="place-line">
                    ${escapeHtml(place.openingHours || "")}
                    ${place.station ? `&nbsp;&nbsp;&nbsp;&nbsp;${escapeHtml(place.station)}` : ""}
                    ${place.walk ? ` • ${escapeHtml(place.walk)}` : ""}
                  </div>
                  <div class="place-note">${escapeHtml(place.notes || "")}</div>
                  ${
                    place.bestFor
                      ? `<span class="accent-label" style="background:${cfg.bg}; color:${cfg.color}; border-color:${cfg.border};">${escapeHtml(place.bestFor)}</span>`
                      : ""
                  }
                </div>
              `;
            })
            .join("")}
        </section>
      `;
    }

    function renderPrepTab() {
      const doneCount = CHECKLIST.filter((item) => isDone(item.name)).length;
      
      // Extract unique categories from the checklist
      const categories = [...new Set(CHECKLIST.map(item => item.category))];

      return `
        <section class="section-block fade-in">
          ${renderSectionTitle({
            eyebrow: "Before departure",
            title: "Prep",
            subtitle: "Action cards, a proper checkable to-do list, and hotel confirmations in one place.",
            color: "#B45309"
          })}

          <div class="action-wrap">
            <div class="action-head pressable" onclick="appActions.toggleActions()">
              <div class="action-head-left">
                <span>⚠️</span>
                <span class="action-head-title">Action Required</span>
              </div>
              <span class="chevron ${STATE.actionsOpen ? "open" : ""}" style="color:#B45309;">⌄</span>
            </div>

            ${
              STATE.actionsOpen
                ? `
                  <div class="action-list fade-in">
                    ${ACTIONS.map(
                      (action) => `
                        <div class="action-card">
                          <div class="action-card-top">
                            <div class="action-card-title">${escapeHtml(action.title)}</div>
                            ${action.urgent ? `<span class="urgent">URGENT</span>` : ""}
                          </div>
                          <div class="action-card-desc">${escapeHtml(action.desc)}</div>
                        </div>
                      `
                    ).join("")}
                  </div>
                `
                : ""
            }
          </div>

          ${renderSectionTitle({
            eyebrow: "Checklist",
            title: `Pre-trip tasks • ${doneCount}/${CHECKLIST.length} done`,
            subtitle: "Categorized lists to keep your planning organized.",
            color: "#7C2D12"
          })}

          ${categories.map(category => {
            const items = CHECKLIST.filter(item => item.category === category);
            return `
              <div style="font-size: 11px; font-weight: 800; color: #8A7566; text-transform: uppercase; letter-spacing: 1.5px; margin: 20px 0 10px 4px;">
                ${escapeHtml(category)}
              </div>
              ${items.map((item) => {
                const checked = isDone(item.name);
                const inputId = `todo-${item.name.replace(/[^a-z0-9]+/gi, "-").toLowerCase()}`;
                return `
                  <label for="${inputId}" class="check-row pressable ${checked ? "done" : ""}">
                    <input
                      id="${inputId}"
                      type="checkbox"
                      ${checked ? "checked" : ""}
                      onchange="appActions.toggleDone('${escapeHtml(item.name).replace(/&#39;/g, "\\'")}')"
                    />
                    <div>
                      <div class="check-title">${escapeHtml(item.name)}</div>
                      <div class="check-sub">${escapeHtml(item.sub)}</div>
                    </div>
                  </label>
                `;
              }).join("")}
            `;
          }).join("")}

          ${renderSectionTitle({
            eyebrow: "Hotels",
            title: "Confirmations",
            subtitle: "",
            color: "#1D4ED8"
          })}

          ${HOTELS.map((hotel) => {
            const cfg = getCityCfg(hotel.city);
            return `
              <div class="card hotel-card" style="border-color:${cfg.border}55;">
                <div class="hotel-icon">${cfg.emoji}</div>
                <div>
                  <div class="hotel-name">${escapeHtml(hotel.name)}</div>
                  <div class="hotel-meta">${escapeHtml(hotel.dates)} • ${hotel.nights} nights • ${escapeHtml(hotel.area)}</div>
                </div>
              </div>
            `;
          }).join("")}
        </section>
      `;
    }

    function renderTipsTab() {
      return `
        <section class="section-block fade-in">
          ${renderSectionTitle({
            eyebrow: "Practical",
            title: "Japan tips",
            subtitle: "Your original guidance stays here, with the shared data sections living above it.",
            color: "#155E3E"
          })}

          ${TIPS.map(
            (tip) => `
              <div class="card tip-card">
                <div class="tip-title">${escapeHtml(tip.icon)} ${escapeHtml(tip.title)}</div>
                <div class="tip-body">${escapeHtml(tip.body)}</div>
              </div>
            `
          ).join("")}

          <div class="footer-banner">
            <div class="line-1">Osaka • Kyoto • Tokyo</div>
            <div class="line-2">25 Nov – 7 Dec 2026 • 13 Days • 12 Nights</div>
          </div>
        </section>
      `;
    }

    function renderActiveTab() {
      switch (STATE.tab) {
        case "schedule":
          return renderScheduleTab();
        case "cities":
          return renderCitiesTab();
        case "food":
          return renderFoodTab();
        case "shopping":
          return renderShoppingTab();
        case "prep":
          return renderPrepTab();
        case "tips":
          return renderTipsTab();
        default:
          return renderScheduleTab();
      }
    }

    function renderApp() {
      document.getElementById("app").innerHTML = `
        ${renderHeader()}
        ${renderTabBar()}
        <main class="content">
          ${renderActiveTab()}
        </main>
      `;
    }

    renderApp();
  </script>
</body>
</html>
